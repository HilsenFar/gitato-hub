<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GITATO — projects & experiments</title>
<meta property="og:title" content="GITATO" />
<meta property="og:description" content="Projects & experiments by HilsenFar" />
<meta property="og:image" content="https://gitato.net/assets/sprunkiverse-cover.png" />
<meta name="theme-color" content="#05060d" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" href="assets/icons/icon-192.png" />
<link rel="apple-touch-icon" href="assets/icons/icon-180.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="GITATO" />
<style>
  :root {
    --ink: #eef0ff;
    --dim: #8b90b3;
    --panel: rgba(12, 14, 28, 0.7);
    --line: rgba(140, 150, 255, 0.16);
    --glow: #7c6cff;
    --accent: #ff4d6d;
    --gold: #ffd76e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    min-height: 100%;
    background:
      radial-gradient(1200px 700px at 70% -10%, rgba(124, 108, 255, 0.16), transparent 60%),
      radial-gradient(900px 600px at 10% 110%, rgba(255, 77, 109, 0.10), transparent 60%),
      #05060d;
    color: var(--ink);
    font-family: "Segoe UI", system-ui, sans-serif;
  }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 72px 24px 60px; }

  h1 {
    font-size: clamp(52px, 10vw, 108px);
    font-weight: 900;
    letter-spacing: 0.08em;
    line-height: 0.95;
    background: linear-gradient(180deg, #ffffff 15%, #a9b0ff 55%, #6e5cff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 30px rgba(124, 108, 255, 0.45));
  }
  .tagline {
    margin-top: 14px;
    color: var(--dim);
    letter-spacing: 0.32em;
    font-size: 12px;
    text-transform: uppercase;
  }

  .grid {
    margin-top: 64px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 22px;
  }
  .card {
    position: relative;
    display: block;
    border-radius: 20px;
    background: var(--panel);
    border: 1px solid var(--line);
    overflow: hidden;
    text-decoration: none;
    color: var(--ink);
    transition: transform .22s ease, border-color .22s, box-shadow .22s;
  }
  a.card:hover {
    transform: translateY(-8px);
    border-color: rgba(140, 150, 255, 0.55);
    box-shadow: 0 30px 70px -20px rgba(124, 108, 255, 0.55);
  }
  .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .card .body { padding: 20px 22px 22px; }
  .card h2 { font-size: 19px; letter-spacing: 0.1em; }
  .card p { margin-top: 8px; font-size: 13.5px; line-height: 1.6; color: var(--dim); }
  .card .cta {
    display: inline-block;
    margin-top: 14px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.28em;
    color: var(--gold);
  }
  .card.soon { opacity: 0.65; }
  .card.soon .thumb {
    aspect-ratio: 16/9;
    display: grid;
    place-items: center;
    font-size: 54px;
    background:
      radial-gradient(360px 200px at 50% 20%, rgba(255, 77, 109, 0.14), transparent 70%),
      #0a0c1c;
  }
  .card.soon .cta { color: var(--dim); }

  footer {
    margin-top: 70px;
    font-size: 11.5px;
    color: #565b7d;
    line-height: 1.8;
  }
  footer a { color: #8b90b3; }
</style>
</head>
<body>
<div class="wrap">
  <h1>GITATO</h1>
  <p class="tagline">Projects &amp; experiments by HilsenFar</p>

  <div class="grid" id="grid"></div>

  <footer>
    © HilsenFar · <a href="https://github.com/HilsenFar">github.com/HilsenFar</a><br>
    Sprunki characters &amp; sounds by NyankoBfLol (Scratch, CC BY-SA 2.0) — fan project.
  </footer>
</div>

<script>
  // Tilføj nye projekter her — resten sker af sig selv.
  const PROJECTS = [
    {
      title: "GITATO — THE GAME",
      desc: "REZ-inspired on-rails rhythm shooter for the hard electronic genres: hardstyle, gabber, frenchcore, psytrance and more. Lock on to the beat, generative music, playable right in your browser.",
      img: "assets/gitato-game-cover.png",
      url: "https://game.gitato.net",
      cta: "PLAY ▸",
    },
    {
      title: "JASON'S SPRUNKIVERSE",
      desc: "Fan-made 3D Sprunki universe in your browser: music mixer with the original cast and horror mode, open world, god simulator and aquarium. Works on desktop and mobile.",
      img: "assets/sprunkiverse-cover.png",
      url: "https://spil.gitato.net",
      cta: "PLAY ▸",
    },
    {
      title: "BEATSURFER",
      desc: "Neon-synthwave rhythm flyer: drop in a song and surf its frequency bands Guitar Hero-style. 6 pilots, star power, built-in demo track — right in your browser.",
      img: "assets/beatsurfer-cover.png",
      url: "https://beatsurfer.gitato.net",
      cta: "PLAY ▸",
    },
    {
      title: "FREQUENCY-PILOT",
      desc: "Rhythm/dodge tunnel flyer for Windows: one song becomes four frequency-band levels. Procedural graphics, YouTube/SoundCloud import. Free download.",
      img: "assets/frequencypilot-cover.png",
      url: "https://frequencypilot.gitato.net",
      cta: "DOWNLOAD ▸",
    },
    {
      title: "ADDSON",
      desc: "Kid-friendly modding sidekick: scans your PC for installed games (Steam & Game Pass) and offers mods for the ones it finds — Minecraft Bedrock, Subnautica, JWE and more. Never touches your saves. With AI Texture Studio.",
      img: "assets/addson-cover.png",
      url: "https://addson.gitato.net",
      cta: "DOWNLOAD ▸",
    },
    {
      title: "MEDIESTUDIO",
      desc: "Video editing right in your browser: cut, trim, text, subtitles, effects and MP4 export. Everything stays on your machine — nothing is uploaded. Also available as a Windows app. (Danish UI)",
      img: "assets/mediestudio-cover.png",
      url: "https://mediestudio.gitato.net",
      cta: "OPEN ▸",
    },
    {
      title: "HILSENFAR — MUSIC",
      desc: "Live sets, hard techno and AI basslines. Releases on the way.",
      emoji: "🎧",
      cta: "COMING SOON",
    },
  ];

  const grid = document.getElementById('grid');
  for (const p of PROJECTS) {
    const el = document.createElement(p.url ? 'a' : 'div');
    el.className = 'card' + (p.url ? '' : ' soon');
    if (p.url) { el.href = p.url; }
    el.innerHTML = `
      ${p.img ? `<img src="${p.img}" alt="${p.title}">` : `<div class="thumb">${p.emoji ?? '✦'}</div>`}
      <div class="body">
        <h2>${p.title}</h2>
        <p>${p.desc}</p>
        <span class="cta">${p.cta}</span>
      </div>`;
    grid.appendChild(el);
  }

  if ('serviceWorker' in navigator && !['localhost', '127.0.0.1'].includes(location.hostname)) {
    addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }
</script>
</body>
</html>
