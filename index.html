<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GITATO — projekter & eksperimenter</title>
<meta property="og:title" content="GITATO" />
<meta property="og:description" content="Projekter & eksperimenter af HilsenFar" />
<meta property="og:image" content="https://gitato.net/assets/sprunkiverse-cover.png" />
<meta name="theme-color" content="#05060d" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" href="assets/icons/icon-192.png" />
<link rel="apple-touch-icon" href="assets/icons/icon-180.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="GITATO" />
<style>
  :root {
    --ink: #eef0ff;
    --dim: #8b90b3;
    --panel: rgba(12, 14, 28, 0.7);
    --line: rgba(140, 150, 255, 0.16);
    --glow: #7c6cff;
    --accent: #ff4d6d;
    --gold: #ffd76e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    min-height: 100%;
    background:
      radial-gradient(1200px 700px at 70% -10%, rgba(124, 108, 255, 0.16), transparent 60%),
      radial-gradient(900px 600px at 10% 110%, rgba(255, 77, 109, 0.10), transparent 60%),
      #05060d;
    color: var(--ink);
    font-family: "Segoe UI", system-ui, sans-serif;
  }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 72px 24px 60px; }

  h1 {
    font-size: clamp(52px, 10vw, 108px);
    font-weight: 900;
    letter-spacing: 0.08em;
    line-height: 0.95;
    background: linear-gradient(180deg, #ffffff 15%, #a9b0ff 55%, #6e5cff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 30px rgba(124, 108, 255, 0.45));
  }
  .tagline {
    margin-top: 14px;
    color: var(--dim);
    letter-spacing: 0.32em;
    font-size: 12px;
    text-transform: uppercase;
  }

  .grid {
    margin-top: 64px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 22px;
  }
  .card {
    position: relative;
    display: block;
    border-radius: 20px;
    background: var(--panel);
    border: 1px solid var(--line);
    overflow: hidden;
    text-decoration: none;
    color: var(--ink);
    transition: transform .22s ease, border-color .22s, box-shadow .22s;
  }
  a.card:hover {
    transform: translateY(-8px);
    border-color: rgba(140, 150, 255, 0.55);
    box-shadow: 0 30px 70px -20px rgba(124, 108, 255, 0.55);
  }
  .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .card .body { padding: 20px 22px 22px; }
  .card h2 { font-size: 19px; letter-spacing: 0.1em; }
  .card p { margin-top: 8px; font-size: 13.5px; line-height: 1.6; color: var(--dim); }
  .card .cta {
    display: inline-block;
    margin-top: 14px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.28em;
    color: var(--gold);
  }
  .card.soon { opacity: 0.65; }
  .card.soon .thumb {
    aspect-ratio: 16/9;
    display: grid;
    place-items: center;
    font-size: 54px;
    background:
      radial-gradient(360px 200px at 50% 20%, rgba(255, 77, 109, 0.14), transparent 70%),
      #0a0c1c;
  }
  .card.soon .cta { color: var(--dim); }

  footer {
    margin-top: 70px;
    font-size: 11.5px;
    color: #565b7d;
    line-height: 1.8;
  }
  footer a { color: #8b90b3; }
</style>
</head>
<body>
<div class="wrap">
  <h1>GITATO</h1>
  <p class="tagline">Projekter &amp; eksperimenter af HilsenFar</p>

  <div class="grid" id="grid"></div>

  <footer>
    © HilsenFar · <a href="https://github.com/HilsenFar">github.com/HilsenFar</a><br>
    Sprunki-karakterer &amp; -lyde af NyankoBfLol (Scratch, CC BY-SA 2.0) — fan-projekt.
  </footer>
</div>

<script>
  // Tilføj nye projekter her — resten sker af sig selv.
  const PROJECTS = [
    {
      title: "JASON'S SPRUNKIVERSE",
      desc: "Fan-lavet 3D Sprunki-univers i browseren: musikmixer med det originale cast og horror-mode, open world, gudesimulator og akvarie. Virker på desktop og mobil.",
      img: "assets/sprunkiverse-cover.png",
      url: "https://spil.gitato.net",
      cta: "SPIL ▸",
    },
    {
      title: "HILSENFAR — MUSIK",
      desc: "Livesets, hard techno og AI-basslines. Udgivelser på vej.",
      emoji: "🎧",
      cta: "COMING SOON",
    },
  ];

  const grid = document.getElementById('grid');
  for (const p of PROJECTS) {
    const el = document.createElement(p.url ? 'a' : 'div');
    el.className = 'card' + (p.url ? '' : ' soon');
    if (p.url) { el.href = p.url; }
    el.innerHTML = `
      ${p.img ? `<img src="${p.img}" alt="${p.title}">` : `<div class="thumb">${p.emoji ?? '✦'}</div>`}
      <div class="body">
        <h2>${p.title}</h2>
        <p>${p.desc}</p>
        <span class="cta">${p.cta}</span>
      </div>`;
    grid.appendChild(el);
  }

  if ('serviceWorker' in navigator && !['localhost', '127.0.0.1'].includes(location.hostname)) {
    addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }
</script>
</body>
</html>
